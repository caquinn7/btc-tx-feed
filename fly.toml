# app name is set by `fly launch` — update this before deploying
app = "btc-tx-feed"
primary_region = "dfw"

[env]
  PHX_HOST = "btc-tx-feed.fly.dev"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "btc_tx_feed_data"
  destination = "/data"
