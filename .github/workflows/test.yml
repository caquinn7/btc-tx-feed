name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          gleam-version: "1.14.0"

      - name: Install mix_gleam archive
        run: mix archive.install hex mix_gleam "~> 0.6.2" --force

      - name: Install dependencies
        run: mix deps.get

      # btc_tx is a git dep with Gleam test files that import gleeunit (a dev
      # dep of btc_tx in its gleam.toml). gleam.deps.get doesn't fetch dev deps
      # of dependencies, so we download them explicitly before compilation so
      # the Gleam compiler can resolve them when it compiles btc_tx's test files.
      - name: Download Gleam deps for btc_tx
        run: cd deps/btc_tx && gleam deps download

      # MIX_ENV=test is set only here, not globally.
      # mix deps.get (and the gleam.deps.get it triggers via the alias) must run
      # in the default dev env because mix_gleam builds Gleam artefacts into
      # build/dev/. Setting MIX_ENV=test globally causes compile to look for
      # those artefacts under build/test/, where they don't exist.
      - name: Compile
        run: mix compile --warnings-as-errors
        env:
          MIX_ENV: test

      - name: Run tests
        run: mix test
        env:
          MIX_ENV: test
