name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
          gleam-version: "1.14.0"

      - name: Install mix_gleam archive
        run: mix archive.install hex mix_gleam "~> 0.6.2" --force

      - name: Install dependencies
        run: mix deps.get

      # btc_tx is a git dep with Gleam test files that import gleeunit (a dev
      # dep of btc_tx in its gleam.toml). During a full clean compile, Mix skips
      # the Gleam compiler step for gleeunit because it has pre-compiled .erl
      # files in src/, so _build/test/lib/gleeunit/_gleam_artefacts/ never gets
      # created. btc_tx's Gleam compilation then fails because it can't find
      # gleeunit. Pre-compiling all three Gleam packages in dependency order
      # ensures their _gleam_artefacts are in place before btc_tx compiles.
      - name: Pre-compile Gleam packages
        run: mix deps.compile gleam_stdlib gleam_crypto gleeunit
        env:
          MIX_ENV: test

      # MIX_ENV=test is set only for compile and test — not globally — because
      # mix deps.get (and gleam.deps.get via the alias) must run in the default
      # dev env. mix_gleam builds Gleam artefacts into build/dev/erlang/ inside
      # each dep and those paths are env-specific.
      - name: Compile
        run: mix compile --warnings-as-errors
        env:
          MIX_ENV: test

      - name: Run tests
        run: mix test
        env:
          MIX_ENV: test
